<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iridescent Shader Wallpapers</title>
<style>
  :root{
    --glass: rgba(255,255,255,0.05);
    --glass-edge: rgba(255,255,255,0.16);
    --ink: rgba(255,255,255,0.92);
    --ink-dim: rgba(255,255,255,0.45);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:#000; }
  body{
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    -webkit-font-smoothing:antialiased;
    color:var(--ink);
    cursor: crosshair;
  }
  #gl{ position:fixed; inset:0; display:block; }

  .fail{ position:fixed; inset:0; display:grid; place-items:center; color:#fff; font-family:monospace; }

  /* ---- top-left identity ---- */
  .hud{
    position:fixed; top:26px; left:28px; z-index:10;
    pointer-events:none;
    user-select:none;
  }
  .hud .kicker{
    font-size:10px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--ink-dim); margin-bottom:10px;
    display:flex; align-items:center; gap:9px;
  }
  .hud .kicker .dot{
    width:6px; height:6px; border-radius:50%;
    background:#fff; box-shadow:0 0 10px #fff, 0 0 20px rgba(255,255,255,.6);
    animation: pulse 3.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  #wpName{
    font-size:30px; font-weight:600; letter-spacing:-.01em;
    line-height:1;
    text-shadow:0 2px 24px rgba(0,0,0,.55);
  }
  #wpHint{
    margin-top:8px; font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-dim);
  }

  /* ---- bottom picker ---- */
  .ui{ }
  #dock{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    z-index:10;
    display:flex; align-items:center; gap:6px;
    padding:7px;
    border-radius:16px;
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    border:1px solid var(--glass-edge);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    box-shadow: 0 12px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
  }
  #picker{ display:flex; gap:4px; }
  .chip{
    appearance:none; border:0; cursor:pointer;
    display:flex; align-items:center; gap:9px;
    padding:11px 16px;
    border-radius:11px;
    background:transparent;
    color:var(--ink-dim);
    font-family:inherit; font-size:13px; letter-spacing:.02em;
    transition: background .25s ease, color .25s ease, transform .15s ease;
  }
  .chip .idx{
    font-size:10px; letter-spacing:.1em;
    color:rgba(255,255,255,.3);
    transition: color .25s ease;
  }
  .chip .lab{ font-weight:500; }
  .chip:hover{ color:var(--ink); background:rgba(255,255,255,.06); }
  .chip.on{
    color:#0a0a0a;
    background:rgba(255,255,255,.94);
    box-shadow:0 4px 16px rgba(0,0,0,.3);
  }
  .chip.on .idx{ color:rgba(0,0,0,.4); }

  .hint-foot{
    position:fixed; right:28px; bottom:30px; z-index:10;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-dim); pointer-events:none; user-select:none;
    text-align:right; line-height:1.9;
  }
  .hint-foot b{ color:var(--ink); font-weight:600; }

  @media (max-width:640px){
    .chip .lab{ display:none; }
    .chip{ padding:12px 13px; }
    .hint-foot{ display:none; }
    #wpName{ font-size:24px; }
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="hud">
    <div class="kicker"><span class="dot"></span>Surface OS · Wallpaper</div>
    <div id="wpName">—</div>
    <div id="wpHint">—</div>
  </div>

  <div class="hint-foot">
    <div>move to <b>warp the field</b> · the light follows</div>
    <div>click to <b>send a pulse</b> · <b>1–2</b> / <b>←→</b> to switch</div>
  </div>

  <div id="dock" class="ui">
    <div id="picker"></div>
  </div>

  <script src="shaders.js"></script>
  <script src="app.js"></script>
</body>
</html>
